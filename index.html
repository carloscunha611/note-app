<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NoteHub</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/style.css" />
    <link
      rel="shortcut icon"
      href="./src/assets/favicon2.png"
      type="image/x-icon"
    />
  </head>
  <body>
    <nav class="navBar">
      <img class="logo" src="./src/assets/logo.png" alt="Logo" />
      <div class="navActions">
        <label class="sr-only" for="searchNotes">Buscar notas</label>
        <input
          id="searchNotes"
          class="searchNotes"
          type="search"
          placeholder="Buscar notas..."
          aria-label="Buscar notas"
        />
        <label class="sr-only" for="sortNotes">Ordenar notas</label>
        <select id="sortNotes" class="sortNotes" aria-label="Ordenar notas">
          <option value="updated_desc">Mais recentes</option>
          <option value="updated_asc">Mais antigas</option>
          <option value="created_desc">Criação recente</option>
          <option value="title_asc">Título A-Z</option>
        </select>
        <button class="exportNotes" aria-label="Exportar notas">
          <ion-icon name="download-outline"></ion-icon>
        </button>
        <button class="importNotes" aria-label="Importar notas">
          <ion-icon name="cloud-upload-outline"></ion-icon>
        </button>
        <input
          id="importFileInput"
          class="hidden"
          type="file"
          accept="application/json"
          aria-label="Escolher arquivo JSON para importar"
        />
      <button class="addNewNote" aria-label="Criar nova nota">
        <ion-icon name="add"></ion-icon>
      </button>
      </div>
    </nav>
    <p class="txt-newNote">
      Clique no botão "<ion-icon name="add"></ion-icon>"
    </p>
    <main class="master"></main>
    <aside class="undoToast hidden" role="status" aria-live="polite">
      <p>Nota removida.</p>
      <button class="undoDeleteBtn" aria-label="Desfazer exclusão">
        Desfazer
      </button>
    </aside>
    <footer>
      <a href="https://carloscunha611.github.io/portfolio/" target="_blank">
        <img
          class="logoC"
          src="./src/assets/logoC.png"
          alt="Logo do Portfólio"
        />
      </a>
      <div>
        <p>
          Dev. by <span>C</span>arlos <span>C</span>unha <span>J</span>r. &copy;
          2023
        </p>
      </div>
    </footer>
    <!-- scripts -->
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/marked/3.0.8/marked.min.js"
      defer
    ></script>
    <script src="./src/main.js" defer></script>
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>
  </body>
</html>
